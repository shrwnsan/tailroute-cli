name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build tailroute-proxy
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          cache-dependency-path: proxy/go.sum

      - name: Get version from tag
        id: get_version
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Build for Darwin ARM64
        working-directory: proxy
        env:
          CGO_ENABLED: 0
          GOOS: darwin
          GOARCH: arm64
        run: |
          go build -ldflags="-s -w -X main.version=${{ steps.get_version.outputs.VERSION }}" \
            -o build/tailroute-proxy-darwin-arm64 .

      - name: Build for Darwin AMD64
        working-directory: proxy
        env:
          CGO_ENABLED: 0
          GOOS: darwin
          GOARCH: amd64
        run: |
          go build -ldflags="-s -w -X main.version=${{ steps.get_version.outputs.VERSION }}" \
            -o build/tailroute-proxy-darwin-amd64 .

      - name: Generate SHA256 checksums
        working-directory: proxy/build
        run: |
          sha256sum tailroute-proxy-darwin-arm64 > tailroute-proxy-darwin-arm64.sha256
          sha256sum tailroute-proxy-darwin-amd64 > tailroute-proxy-darwin-amd64.sha256

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: tailroute-proxy-binaries
          path: |
            proxy/build/tailroute-proxy-darwin-arm64
            proxy/build/tailroute-proxy-darwin-amd64
            proxy/build/tailroute-proxy-darwin-arm64.sha256
            proxy/build/tailroute-proxy-darwin-amd64.sha256
          retention-days: 1

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Get version from tag
        id: get_version
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: tailroute-proxy-binaries
          path: artifacts

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          name: tailroute-proxy ${{ steps.get_version.outputs.VERSION }}
          draft: false
          prerelease: ${{ contains(steps.get_version.outputs.VERSION, '-') }}
          generate_release_notes: true
          files: |
            artifacts/tailroute-proxy-darwin-arm64
            artifacts/tailroute-proxy-darwin-amd64
            artifacts/tailroute-proxy-darwin-arm64.sha256
            artifacts/tailroute-proxy-darwin-amd64.sha256
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
